services:
  - type: web
    name: voice-article-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      # Renderダッシュボードで設定してください：
      # OPENAI_API_KEY = sk-...
      # ANTHROPIC_API_KEY = sk-ant-...
